name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python --version
          pip install --upgrade pip
          pip install jax==0.8.0 jaxlib==0.8.0
          pip install equinox==0.13.2
          pip install -e .
          pip install pytest
      - name: Run tests
        run: |
          mkdir -p reports
          pytest --maxfail=1 --disable-warnings --junitxml=reports/junit.xml -q
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/

  pages:
    runs-on: ubuntu-latest
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    needs: test
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install jax==0.8.0 jaxlib==0.8.0
          pip install equinox==0.13.2
          pip install -e .
          pip install mkdocs mkdocs-material mkdocs-jupyter mkdocstrings[python]
          pip install svg_sampler
      - name: Build docs
        run: |
          cd docs-site
          if [ -e ../examples ]; then
            rm -rf docs/examples
            mkdir -p docs
            cp -r ../examples docs/examples
          fi
          mkdocs build --clean --site-dir ../public
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

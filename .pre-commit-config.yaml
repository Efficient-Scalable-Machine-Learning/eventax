repos:
  - repo: local
    hooks:
      - id: flake8
        name: flake8
        entry: flake8 --ignore=E701,E702,E703,E704,F722,F821,W504 --max-line-length=120
        language: system
        files: ^(src|tests)/.*\.py$

      - id: autopep8
        name: autopep8
        entry: autopep8 --max-line-length=120 --in-place
        language: system
        files: ^(src|tests)/.*\.py$
